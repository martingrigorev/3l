version: '3.8'

services:
  lev-letters-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lev-letters-app
    restart: unless-stopped
    ports:
      - "3000:80"
    # Port 3000 is mapped to container port 80 (nginx)
    # You can change 3000 to any other port available on your Synology
